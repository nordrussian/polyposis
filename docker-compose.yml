services:
  app:
    build:
      dockerfile: ./Dockerfile
      context: ./
    # volumes:
    #   - static_volume:/code/static
    #   - media_volume:/code/media
    env_file:
      - .env
    ports:
      - "${APP_PORT_OUT}:8000"
    depends_on:
      - pg
    command: python npass/manage.py runserver 0.0.0.0:8000


  pg:
    image: postgres:18
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT_OUT}:${DB_PORT}"
    volumes:
      - db-data:/var/lib/postgresql/data/

volumes:
  db-data:
  # static_volume:
  # media_volume: